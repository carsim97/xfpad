# Green Bit DactyScan84C scanner configuration.
# Inherits from configs/base.yaml.

scanner: greenbit

# Plot frame for cross-figure alignment (matches Section V of the paper).
plot:
  axes_lim:
    xlim: [-7.43,  9.43]
    ylim: [-10.67, 11.82]

# Label mapping for the TRAINING split.
#   - Each rule has a 'match' (list of substrings, all required in the path)
#     and a 'label' (integer; bona fide is 0, PAIs are contiguous 1..K).
#   - The first rule that matches wins.
#   - K is inferred from the maximum non-zero label (= number of PAI prototypes).
training_labels:
  mapping:
    - { match: ["Live"],     label: 0 }
    - { match: ["LIVE"],     label: 0 }
    - { match: ["Latex"],    label: 1 }
    - { match: ["Fast"],     label: 2 }
    - { match: ["LATEX"],    label: 3 }
    - { match: ["RPRO10"],   label: 4 }
    - { match: ["Ecoflex"],  label: 5 }
    - { match: ["Body"],     label: 6 }
    - { match: ["Wood"],     label: 7 }
  names:
    0: "Bona Fide"
    1: "Latex"
    2: "RProFast"
    3: "Latex V2"
    4: "RPro10"
    5: "Ecoflex"
    6: "Body Double"
    7: "Wood Glue"

# Label mapping for the unseen-PAI VALIDATION split (LivDet 2021).
unseen_labels:
  mapping:
    - { match: ["Live"],                  label: 0 }
    - { match: ["LIVE"],                  label: 0 }
    - { match: ["VBN",  "Consensual"],    label: 1 }
    - { match: ["Body", "Consensual"],    label: 2 }
    - { match: ["Wood", "Consensual"],    label: 3 }
    - { match: ["VBN",  "ScreenSpoof"],   label: 4 }
    - { match: ["Body", "ScreenSpoof"],   label: 5 }
    - { match: ["Wood", "ScreenSpoof"],   label: 6 }
  names:
    0: "Bona Fide"
    1: "Mix1 Consensual"
    2: "Body Double Consensual"
    3: "Elmer's Glue Consensual"
    4: "Mix1 ScreenSpoof"
    5: "Body Double ScreenSpoof"
    6: "Elmer's Glue ScreenSpoof"
